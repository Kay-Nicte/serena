name: OTA Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Update message'
        required: true
        default: 'OTA update'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA (Android)
        run: eas update --branch production --platform android --message "${{ github.event.inputs.message }}"

      - name: Publish OTA (iOS)
        run: eas update --branch production --platform ios --message "${{ github.event.inputs.message }}"
